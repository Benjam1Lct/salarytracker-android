<svg width="512" height="512" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B7CF6"/>
      <stop offset="1" stop-color="#6D5BD0"/>
    </linearGradient>
    <!-- Coins arrondis -->
    <clipPath id="round"><rect x="0" y="0" width="108" height="108" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
  <!-- Fond : dégradé violet diagonal (identique à ic_launcher_background) -->
  <rect x="0" y="0" width="108" height="108" fill="url(#bg)"/>
  <!-- Cercle lumineux subtil en haut à droite -->
  <path d="M108,0 A55,55 0 0 1 108,55 L108,0 Z" fill="#FFFFFF" fill-opacity="0.094"/>

  <!-- Avant-plan : jauge + symbole € (identique à ic_launcher_foreground, scale 0.8) -->
  <g transform="translate(54,54) scale(0.8) translate(-54,-54)" fill="none"
     stroke-linecap="round">
    <!-- Piste de la jauge (blanc 20%) -->
    <path d="M26.3,70 A32,32 0 1,1 81.7,70" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="6"/>
    <!-- Progression (~70%) -->
    <path d="M26.3,70 A32,32 0 0,1 77.8,32.6" stroke="#FFFFFF" stroke-width="6"/>
    <!-- Pastille à l'extrémité -->
    <circle cx="77.8" cy="32.6" r="4.5" fill="#FFFFFF" stroke="none"/>
    <!-- Symbole € : arc C ouvert à droite -->
    <path d="M64.4,48 A12,12 0 1,0 64.4,60" stroke="#FFFFFF" stroke-width="5"/>
    <!-- Barre supérieure du € -->
    <path d="M41,50 H64" stroke="#FFFFFF" stroke-width="4.5"/>
    <!-- Barre inférieure du € -->
    <path d="M41,57 H64" stroke="#FFFFFF" stroke-width="4.5"/>
  </g>
  </g>
</svg>
